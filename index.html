<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur de Rendement Intelligent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

<header class="border-b border-gray-800 p-4 bg-gray-950">
  <div class="max-w-4xl mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold text-emerald-400">⚡ TechCalc</h1>
    <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20">V2.0 - Stable</span>
  </div>
</header>

<main class="max-w-md mx-auto my-auto p-6 bg-gray-950 rounded-2xl shadow-2xl border border-gray-800 w-full my-8">
  <h2 class="text-2xl font-bold mb-2 text-center">Simulateur d'Intérêts</h2>
  <p class="text-gray-400 text-sm text-center mb-6">Calcule combien ton argent peut te rapporter au fil des années.</p>

  <!-- Champs de saisie -->
  <div class="space-y-4">
    <div>
      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Somme de départ (€)</label>
      <input type="number" id="capital" value="1000" min="0"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 transition-colors">
    </div>
    <div>
      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Taux d'intérêt annuel (%)</label>
      <input type="number" id="taux" value="5" step="0.1" min="0"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 transition-colors">
    </div>
    <div>
      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Durée (en années)</label>
      <input type="number" id="annees" value="10" min="1" max="50"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 transition-colors">
    </div>

    <button onclick="calculerGain()"
      class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] text-gray-950 font-bold p-3 rounded-lg transition-all mt-6 shadow-lg shadow-emerald-500/20">
      Calculer le gain
    </button>
  </div>

  <!-- Graphique en courbe -->
  <div class="mt-8 pt-6 border-t border-gray-800">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Évolution année après année</p>
    <div style="position: relative; width: 100%; height: 220px;">
      <canvas id="graphiqueInterets" role="img" aria-label="Courbe d'évolution du capital avec intérêts composés"></canvas>
    </div>
  </div>

  <!-- Résultat final -->
  <div class="mt-8 pt-6 border-t border-gray-800 text-center">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Montant final estimé</p>
    <div id="resultat" class="text-3xl font-extrabold text-emerald-400 mb-1">1 628,89 €</div>
    <div id="gain-label" class="text-sm text-gray-500">+628,89 € d'intérêts en 10 ans</div>
  </div>
</main>

<footer class="text-center p-4 text-gray-600 text-xs border-t border-gray-800 bg-gray-950">
  Propulsé par le code • 2026
</footer>

<script>
// ── Utilitaire de formatage français ──────────────────────────────────────────
function fmt(val, dec = 2) {
  return val.toLocaleString('fr-FR', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// ── Construction des données pour un jeu de paramètres ───────────────────────
function construireData(capital, taux, annees) {
  const labels  = [];
  const montants = [];
  for (let i = 0; i <= annees; i++) {
    labels.push('An ' + i);
    montants.push(parseFloat((capital * Math.pow(1 + taux, i)).toFixed(2)));
  }
  return { labels, montants };
}

// ── Initialisation du graphique (données par défaut : 1 000 €, 5 %, 10 ans) ─
const { labels: labelsInit, montants: montantsInit } = construireData(1000, 0.05, 10);

const ctx = document.getElementById('graphiqueInterets').getContext('2d');

// Dégradé vert sous la courbe
const gradient = ctx.createLinearGradient(0, 0, 0, 220);
gradient.addColorStop(0,   'rgba(16, 185, 129, 0.35)');
gradient.addColorStop(1,   'rgba(16, 185, 129, 0.00)');

const myChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labelsInit,
    datasets: [{
      label: 'Capital total',
      data: montantsInit,
      borderColor:     '#10b981',
      borderWidth:     2.5,
      pointBackgroundColor: '#10b981',
      pointBorderColor:     '#111827',
      pointBorderWidth:     2,
      pointRadius:     4,
      pointHoverRadius: 6,
      backgroundColor: gradient,
      fill: true,
      tension: 0.4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#111827',
        borderColor:     '#374151',
        borderWidth:     1,
        titleColor:      '#9ca3af',
        bodyColor:       '#f3f4f6',
        padding:         10,
        callbacks: {
          title: (items) => items[0].label,
          label: (item)  => '  ' + fmt(item.raw) + ' €'
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#6b7280',
          font:  { size: 11 },
          autoSkip: true,
          maxRotation: 0
        },
        grid:   { color: 'rgba(255,255,255,0.05)' },
        border: { color: 'rgba(255,255,255,0.08)' }
      },
      y: {
        ticks: {
          color: '#6b7280',
          font:  { size: 11 },
          callback: (v) => fmt(v, 0) + ' €'
        },
        grid:   { color: 'rgba(255,255,255,0.05)' },
        border: { color: 'rgba(255,255,255,0.08)' }
      }
    }
  }
});

// ── Fonction principale appelée par le bouton ─────────────────────────────────
function calculerGain() {
  const capital = parseFloat(document.getElementById('capital').value);
  const taux    = parseFloat(document.getElementById('taux').value) / 100;
  const annees  = parseInt(document.getElementById('annees').value);

  // Validation
  if (isNaN(capital) || isNaN(taux) || isNaN(annees) || capital < 0 || annees < 1) {
    document.getElementById('resultat').textContent   = 'Erreur de saisie';
    document.getElementById('gain-label').textContent = '';
    return;
  }

  // Calcul des données année par année
  const { labels, montants } = construireData(capital, taux, annees);

  const valeurFinale = montants[annees];
  const gainTotal    = valeurFinale - capital;

  // Mise à jour du texte
  document.getElementById('resultat').textContent   = fmt(valeurFinale) + ' €';
  document.getElementById('gain-label').textContent =
    '+' + fmt(gainTotal) + ' € d\'intérêts en ' + annees + ' an' + (annees > 1 ? 's' : '');

  // Mise à jour dynamique du graphique
  myChart.data.labels              = labels;
  myChart.data.datasets[0].data   = montants;

  // Régénération du dégradé (au cas où la hauteur aurait changé)
  const newGradient = ctx.createLinearGradient(0, 0, 0, 220);
  newGradient.addColorStop(0, 'rgba(16, 185, 129, 0.35)');
  newGradient.addColorStop(1, 'rgba(16, 185, 129, 0.00)');
  myChart.data.datasets[0].backgroundColor = newGradient;

  myChart.update();
}
</script>

</body>
</html>
